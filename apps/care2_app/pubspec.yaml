name: care2_app
description: "Care 2.0 — Preventive Health Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^14.2.0
  
  # HTTP Client
  dio: ^5.4.0
  
  # Firebase
  firebase_core: ^3.1.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  
  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  
  # Camera & Image
  image_picker: ^1.0.7
  camera: ^0.11.0
  
  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  
  # Health Data (Google Fit API)
  google_sign_in: ^6.2.1
  http: ^1.2.0
  
  # ML
  # tflite_flutter: ^0.10.4
  
  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  file_picker: ^8.0.0
  url_launcher: ^6.2.2
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  

